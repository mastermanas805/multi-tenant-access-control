# Static SPA serving for the demo UI. The app is a single-page application, so any
# unknown path falls back to index.html (client-side rendering). The SPA makes its
# API calls cross-origin to the gateway (CORS is enabled there), so there is no
# reverse-proxy block here — nginx only serves the built assets.
server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Long-cache the fingerprinted assets; never cache the HTML entrypoint.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  location / {
    add_header Cache-Control "no-cache";
    try_files $uri $uri/ /index.html;
  }
}
