name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Typecheck · Lint · Format · Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm -w run typecheck
      - run: pnpm -w run lint
      - run: pnpm -w run format:check
      - run: pnpm -w run build

  unit-e2e:
    name: Unit · Service e2e
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm gen:keys # dev RS256 keypair (git-ignored, generated on demand)
      - run: pnpm -w run test
      - run: pnpm -w run test:e2e

  integration:
    name: Integration (Testcontainers — real Postgres + Cerbos)
    runs-on: ubuntu-latest
    # ubuntu-latest ships with Docker, so Testcontainers can spin real
    # Postgres + Cerbos and prove RLS isolation + real policy decisions.
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm gen:keys # dev RS256 keypair (git-ignored, generated on demand)
      - run: pnpm -w run build
      - run: pnpm -w run test:integration

  playwright:
    name: Playwright (full docker-compose stack)
    runs-on: ubuntu-latest
    # The Playwright global-setup brings the whole stack up via
    # docker compose + bootstrap, runs the UI flows, then tears down.
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm gen:keys # dev RS256 keypair before docker build (git-ignored)
      - run: pnpm --filter @tests/e2e-playwright exec playwright install --with-deps chromium
      - run: pnpm -w run test:playwright
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 7
